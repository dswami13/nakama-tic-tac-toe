<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakama Tic-Tac-Toe</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .screen { display: none; text-align: center; }
        .screen.active { display: block; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background-color: #16213e; display: flex; justify-content: center; align-items: center; font-size: 3em; cursor: pointer; }
        input, button { margin-top: 10px; padding: 10px; font-size: 1em; }
        button { background-color: #0f3460; color: white; border: none; cursor: pointer; }
    </style>
</head>
<link rel="icon" href="data:,">
<body>

    <div id="login-screen" class="screen active">
        <h2>Who are you?</h2>
        <input type="text" id="nickname-input" placeholder="Enter Nickname">
        <button id="login-btn">Continue</button>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>Game Lobby</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="quick-play-btn">Quick Play (Random)</button>
            <button id="create-match-btn">Create Custom Room</button>
            <button id="refresh-matches-btn">Refresh List</button>
        </div>
        
        <h3>Open Rooms</h3>
        <div id="match-list" style="border: 1px solid #ccc; padding: 10px; min-height: 100px;">
            Click "Refresh List" to find open games.
        </div>
    </div>

    <div id="matchmaking-screen" class="screen">
        <h2>Finding a random player...</h2>
        <p>Please wait...</p>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="status-text">Waiting for opponent...</h2>
        
        <div class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button id="play-again-btn" style="display: none; background-color: #5cb85c; color: white;">Play Again</button>
            <button id="leave-match-btn" style="display: block; background-color: #d9534f; color: white;">Leave Match</button>
        </div>
    </div>
    

    <script src="nakama-js.umd.js"></script>
    <script src="client.js"></script>
</body>
</html>
